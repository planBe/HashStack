name: HashStack

options:
  bundleIdPrefix: com.planbecreative
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Release
  groupSortPosition: top
  xcodeVersion: "2650"        # pins LastUpgradeCheck + scheme LastUpgradeVersion;
                              # without this xcodegen emits 1430 and Xcode 26 re-bumps to 2650.

settings:
  base:
    DEVELOPMENT_TEAM: X22WKZG6P4
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    # Settings Xcode 26 propagates to the project base level when it opens
    # the project. Without these here, xcodegen omits them, Xcode re-adds
    # them, and the diff oscillates every session. Per reference_xcodegen_xcode_drift_fix.
    DEAD_CODE_STRIPPING: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

targets:
  HashStack:
    type: application
    platform: macOS
    sources:
      - path: HashStack
        excludes:
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.planbecreative.HashStack
        PRODUCT_NAME: "$(TARGET_NAME)"
        MARKETING_VERSION: "0.3"
        CURRENT_PROJECT_VERSION: "3"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: HashStack/HashStack.entitlements
        DEAD_CODE_STRIPPING: YES
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_PREVIEWS: YES
        ENABLE_USER_SELECTED_FILES: readonly
        REGISTER_APP_GROUPS: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: hashStack
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Michael Wild"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
        STRING_CATALOG_GENERATE_SYMBOLS: YES
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES
        SUPPORTED_PLATFORMS: macosx
        SDKROOT: macosx
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/Frameworks"
          - "@executable_path/../Frameworks"

schemes:
  HashStack:
    build:
      targets:
        HashStack: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
